name: Send push notification on alert.yaml change

on:
  push:
    branches: [main]
    paths: ['alert.yaml']

jobs:
  send-push:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[push]')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests pyyaml
      
      - name: Send push notification
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          PUSH_SECRET: ${{ secrets.PUSH_SECRET }}
        run: |
          cat > send_push.py << 'PYEOF'
          import yaml
          import requests
          import os
          import sys
          import re
          
          # Завантажуємо alert.yaml
          with open('alert.yaml', 'r', encoding='utf-8') as f:
              data = yaml.safe_load(f)
          
          # Шукаємо першу запис в communal з show=true
          title = "⚡ Комунальні новини"
          body = "Подивись свіжі оголошення на сайті"
          
          if data and 'communal' in data:
              for entry in data['communal']:
                  if entry.get('show') == True:
                      title = entry.get('title', title)
                      body = entry.get('text', body)
                      break
          
          # Очищуємо текст
          # Видаляємо markdown ** жирний текст
          body = re.sub(r'\*\*', '', body)
          # Замінюємо переноси рядків пробілами
          body = re.sub(r'\s+', ' ', body).strip()
          # Обрізаємо до 150 символів
          if len(body) > 150:
              body = body[:149] + '…'
          
          # Очищуємо заголовок: видаляємо двокрапку в кінці
          title = title.rstrip(':').strip()
          if len(title) > 50:
              title = title[:50]
          
          print(f"📋 Заголовок: {title}")
          print(f"📋 Текст: {body}")
          
          # Готуємо payload
          payload = {
              "formType": "github_push",
              "secret": os.environ['PUSH_SECRET'],
              "category": "communal",
              "title": title,
              "body": body,
              "url": "https://vilnohirsk.online"
          }
          
          # Шлемо POST з allow_redirects=True (Python зберігає метод за RFC коректно)
          print("🚀 Sending push to Apps Script...")
          
          # ВАЖЛИВО: використовуємо session щоб правильно обробити редіректи
          session = requests.Session()
          response = session.post(
              os.environ['APPS_SCRIPT_URL'],
              json=payload,
              headers={'Content-Type': 'application/json'},
              allow_redirects=True,
              timeout=30
          )
          
          print(f"📨 HTTP Code: {response.status_code}")
          print(f"📨 Response body: {response.text[:500]}")
          
          # Перевіряємо результат
          if response.status_code == 200:
              try:
                  result = response.json()
                  if result.get('status') == 'success' or result.get('sent') == True:
                      print("✅ Push sent successfully!")
                      sys.exit(0)
                  else:
                      print(f"⚠️ Unexpected response: {result}")
                      sys.exit(1)
              except ValueError:
                  # Не JSON — можливо HTML помилка
                  print("❌ Response is not JSON")
                  sys.exit(1)
          else:
              print(f"❌ HTTP {response.status_code} - request failed")
              sys.exit(1)
          PYEOF
          
          python send_push.py
