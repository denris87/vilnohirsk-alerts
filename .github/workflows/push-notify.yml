name: Send push notification on alert.yaml change

on:
  push:
    branches: [main]
    paths: ['alert.yaml']

jobs:
  send-push:
    runs-on: ubuntu-latest
    # Запускаем тільки якщо в commit message є тег [push]
    if: contains(github.event.head_commit.message, '[push]')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install yq (YAML parser)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      
      - name: Extract first visible communal entry
        id: extract
        run: |
          # Беремо першу запис з category 'communal' де show=true
          TITLE=$(yq eval '[.communal[] | select(.show == true)][0].title' alert.yaml)
          TEXT=$(yq eval '[.communal[] | select(.show == true)][0].text' alert.yaml)
          
          # Якщо нічого не знайдено
          if [ -z "$TITLE" ] || [ "$TITLE" = "null" ]; then
            TITLE="⚡ Комунальні новини"
            TEXT="Подивись свіжі оголошення на сайті"
          fi
          
          # Очищуємо текст від markdown ** і обрізаємо
          CLEAN_TEXT=$(echo "$TEXT" | sed 's/\*\*//g' | tr '\n' ' ' | sed 's/  */ /g' | cut -c1-150)
          if [ ${#CLEAN_TEXT} -ge 150 ]; then
            CLEAN_TEXT="${CLEAN_TEXT}…"
          fi
          
          # Очищуємо заголовок
          CLEAN_TITLE=$(echo "$TITLE" | sed 's/:$//' | cut -c1-50)
          
          # Зберігаємо у GITHUB_OUTPUT через heredoc
          {
            echo "title<<EOF_TITLE"
            echo "$CLEAN_TITLE"
            echo "EOF_TITLE"
            echo "body<<EOF_BODY"
            echo "$CLEAN_TEXT"
            echo "EOF_BODY"
          } >> $GITHUB_OUTPUT
          
          echo "📋 Заголовок: $CLEAN_TITLE"
          echo "📋 Текст: $CLEAN_TEXT"
      
      - name: Send push to Apps Script
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          PUSH_SECRET: ${{ secrets.PUSH_SECRET }}
          PUSH_TITLE: ${{ steps.extract.outputs.title }}
          PUSH_BODY: ${{ steps.extract.outputs.body }}
        run: |
          echo "🚀 Sending push to Apps Script..."
          
          # Формуємо JSON через jq щоб безпечно екранувати спецсимволи
          PAYLOAD=$(jq -n \
            --arg secret "$PUSH_SECRET" \
            --arg category "communal" \
            --arg title "$PUSH_TITLE" \
            --arg body "$PUSH_BODY" \
            --arg url "https://vilnohirsk.online" \
            '{formType: "github_push", secret: $secret, category: $category, title: $title, body: $body, url: $url}')
          
          echo "📦 Payload (without secret):"
          echo "$PAYLOAD" | jq 'del(.secret)'
          
          # КРИТИЧНО: --post301 --post302 щоб curl зберіг POST метод після редіректу Apps Script
          # text/plain важливий бо так само працює сайт
          RESPONSE=$(curl -L --post301 --post302 -s -X POST "$APPS_SCRIPT_URL" \
            -H "Content-Type: text/plain;charset=utf-8" \
            -d "$PAYLOAD" \
            -w "\nHTTP_CODE:%{http_code}")
          
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')
          
          echo "📨 HTTP Code: $HTTP_CODE"
          echo "📨 Response body: $BODY"
          
          # Перевіряємо що відповідь успішна
          if echo "$BODY" | grep -q '"status":"success"'; then
            echo "✅ Push sent successfully!"
          elif echo "$BODY" | grep -q '"sent":true'; then
            echo "✅ Push sent successfully!"
          else
            echo "❌ Push failed. Check Apps Script logs."
            echo "Body was: $BODY"
            exit 1
          fi
