      • вул. Устенка 41, 43 
      • вул. Устенка 35А, 37
      • вул. Устенка 31, 30 
      • вул. Устенка 25, 23 
      • вул. Садова 30/21 
      • вул. Садова 7,5,3,8
      • вул. Степова 33, 31 
      • вул. Будівельників 8 
      • вул. Будівельників 11, 13 
      •  вул. Центральна 12, 10, 4, 5 
      • вул. Центральна 3, 5, 7 
      • вул. Горняків 7, 8, 2, 1, 14, 16 
      • вул. Варена 13/7 
