communal:
  - show: true
    title: "📢 КП «Жилкомсервіс» інформує:"
    text: |
      **Жилкомсервіс повідомляє про тимчасові зміни у графіку збору побутових відходів. Містян просять не залишати сміття у дворах та невстановлених місцях.**   
      **23 квітня (на 1,5 години пізніше):**
      **вул. Українська:** 5, 25
      **вул. Привокзальна:** 5, 6, 16, 19, 26, 37, 49, 61, 75
      **вул. Хмельницького:** 10, 16, 24
      **вул. Степова:** 45, 51
      **вул. Криничанська:** 10, 20, 30

news:
  - show: true
    title: "📢 Вільногірська ЦМЛ інформує:"
    text: |
      **ПРИЙОМ ЛІКАРІВ У ВІЛЬНОГІРСЬКІЙ ЦМЛ ПО СУБОТАМ У КВІТНІ**
      **ФАХІВЦІ:**
      • Лікар-ендокринолог
      • Лікар-невропатолог
      • Лікар-ендоскопіст
      Також проводиться тест (уреазний) на хелікобактер пілорі під час ФГДС
      **18 та 25 квітня планується прийом лікаря-уролога.**
      **КАБІНЕТ УЗД працює:**
      • З понеділка по п'ятницю
      • З 15:00-18:00
      Прийом лікарів відбувається щосуботи **ЗА ПОПЕРЕДНІМ ЗАПИСОМ В РЕЄСТРАТУРІ.**
      **Контактний номер:**
      0682680116
      **Щосуботи проводить прийом лікар-проктолог.**
      За інформацією звертайтесь в реєстратуру. Тел.0682680116
