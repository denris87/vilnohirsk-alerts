    title: "📢 КП «Жилкомсервіс» інформує:"
    text: |
      **Жилкомсервіс повідомляє про тимчасові зміни у графіку збору побутових відходів. Містян просять не залишати сміття у дворах та невстановлених місцях.**   
      **23 квітня (на 1,5 години пізніше):**
      **вул. Українська:** 5, 25
      **вул. Привокзальна:** 5, 6, 16, 19, 26, 37, 49, 61, 75
      **вул. Хмельницького:** 10, 16, 24
      **вул. Степова:** 45, 51
      **вул. Криничанська:** 10, 20, 30

