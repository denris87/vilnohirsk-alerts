    title: "📢 КП «Жілкомсервіс» інформує:"
    text: |
      **КП «Жилкомсервіс» повідомляє, що сьогодні, 12 травня, збір та вивіз сміття за маршрутом №6 не відбудеться з технічних причин.**
      **Починаючи з 13 травня, вивіз побутових відходів за цим маршрутом здійснюватиметься за ранковим графіком:**
      • 06:05 — вул. Молодіжна, 60, 62
      • 06:10 — вул. Молодіжна, 59-А
      • 06:15 — вул. Молодіжна, 62-Б
      • 06:20 — вул. Молодіжна, 60-А, 60-Б
      • 06:25 — вул. Центральна, 81
      • 06:30 — вул. Молодіжна, 58, 56
      • 06:35 — вул. Молодіжна, 55, 55-А
      • 06:40 — вул. Молодіжна, 52, 52-А, 54
      • 06:45 — вул. Центральна, 79-Б, 77-Б, 77-А
      • 06:50 — вул. Центральна, 79, 79-А, 77-В
      **Зверніть увагу: можливі незначні відхилення у часі прибуття спецтранспорту (в межах кількох хвилин)**
      
      **12 травня  (на 1,5 години пізніше звичного часу):**
      • вул. Смерекова 1, 9, 22
