news:
  - show: true
    title: "📢 Вільногірська ЦМЛ інформує:"
    text: |
      **Щосуботи проводить прийом лікар-проктолог.**
      За інформацією звертайтесь в реєстратуру. Тел.0682680116

  - show: true
    title: "📢 ЦЕК інформує:"
    text: |
      **З 1 квітня по 31 жовтня включно**
      Центральна енергетична компанія переходить на літній графік роботи:
      **понеділок - четвер:** з 07:30 до 18:00;
      **обідня перерва:** з 12:00 до 12:30;
      **п'ятниця:** неприймальний день;
      **субота - неділя:** вихідні.

  - show: true
    title: "Автобусний маршрут «ЦМЛ – Кладовище»"
    text: |
         **Коли:** щосуботи (4,11,18 квітня) + додатково 19 квітня (Поминальна неділя).
         **Час:** відправлення від ЦМЛ (нова лікарня) о 07:30, з кладовище о 11:30.
         **Вартість:** 40 грн.
         **Маршрут:** через «Колосок», стару лікарню, VARUS, «Авангард», PROSTOR та кафе «У Петровича».

  - show: true
    title: "📢 Вільногірська ЦМЛ інформує:"
    text: |
         **ПРИЙОМ ЛІКАРІВ У ВІЛЬНОГІРСЬКІЙ ЦМЛ ПО СУБОТАМ У КВІТНІ**
         **ФАХІВЦІ:**
         • Лікар-ендокринолог
         • Лікар-невропатолог
         • Лікар-ендоскопіст
         Також проводиться тест (уреазний) на хелікобактер пілорі під час ФГДС
         **18 та 25 квітня планується прийом лікаря-уролога.**
         **КАБІНЕТ УЗД працює:**
         • З понеділка по п'ятницю
         • З 15:00-18:00
         Прийом лікарів відбувається щосуботи **ЗА ПОПЕРЕДНІМ ЗАПИСОМ В РЕЄСТРАТУРІ.**
         **Контактний номер:**
         0682680116

