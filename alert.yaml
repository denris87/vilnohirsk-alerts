    title: "📢 КП «Енергоефект» інформує:"
    text: |
      Тимчасово не працює свердловина на вул. Садовій, 30/21!
      Через поломку обладнання водопостачання призупинено.
      **Орієнтовне відновлення: середа, 17 червня.**
      **КП «Енергоефект» перепрошує за незручності.**

  - show: false
    title: "📢 КП «Жилрсевіс» інформує:"
    text: |
      **КП «Жилсервіс» попереджає про відключення холодної води 18 червня з 08:00.**
      **Де:** приватний сектор між вул. Степовою та с. Доброгірське.
      **Причина:** монтаж лічильника.
      **Будь ласка, зробіть запаси води на ранок!**


  - show: false
    title: "📢 КП «Жілкомсервіс» інформує:"
    text: |
      **КП «Жілкомсервіс» повідомляє про зміни у графіку збору та вивозу сміття**
      **17 червня (на півтори години звичного часу):**
      • вул. Степова 61/2, 67, 77
      • вул. Зелена 10, 16, 24, 30
      • вул. Гоголя 10, 16, 24, 30
      • вул. Тарасова 10, 16, 24, 30

      **18 червня (на півтори години звичного часу):**
      • вул. Українська 5, 25 
      • вул. Привокзальна 5, 6, 16, 19, 26, 37, 49, 61, 75 
      • вул. Хмельницького 10, 16, 24 
      • вул. Степова 45, 51 
      • вул. Криничанська 10, 20, 30

      **Управляюча компанія звертається до містян із проханням не залишати сміття у дворах та в невстановлених місцях.**

