    title: "📢 ЦЕК інформує:"
    text: |
      **У зв’язку з проведенням планових робіт на електромережах у Вільногірську тимчасово припинятиметься електропостачання за низкою адрес.**
      **21 травня  з 08:00 до 17:30:**
      • вул. Молодіжна: 8, 53, 53А, 54, 55, 55А, 56, 56А, 58, 60А, 60Б; 
      • вул. Центральна: 79А, 79Б, 81.

  - show: false
    title: "📢 КП «Жілкомсервіс» інформує:"
    text: |
      **КП «Жілкомсервіс» повідомляє про зміни у графіку збору та вивозу сміття**
      **З 05 травня по 26 травня (на годину пізніше звичного часу):**
      • вул. Віктора Варена 7, 12, 13/7, 21а, 21/8
      • вул. Юрія Устенка 23, 25, 30, 31, 35а, 37, 41, 43
      • вул. Центральна 3, 4, 5, 7, 10, 12
      • вул. Садова 3, 5, 7, 8, 30/21, 31, 33
      • вул. Степова 31, 33
      • вул. Будівельників 8, 11, 13
      • вул. Горняків 1, 2, 7, 8, 14, 16
      • вул. Молодіжна 16а, 16/1

