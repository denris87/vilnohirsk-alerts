    text: |
      **КП «Жилсервіс» попереджає про відключення холодної води 18 червня з 08:00.**
      **Де:** приватний сектор між вул. Степовою та с. Доброгірське.
      **Причина:** монтаж лічильника.
      **Будь ласка, зробіть запаси води на ранок!**


