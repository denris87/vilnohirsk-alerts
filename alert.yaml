    title: "📢КП «Жилкомсервіс» інформує:"
    text: |
      **Жилкомсервіс повідомляє про зміни у графіку збору та вивозу сміття.**
      **28 квітня  (на 1,5 години пізніше звичного часу):**
      • вул. Смерекова 1, 9, 22
      • вул. Нова 1, 26
      • вул. Конвалій 20, 31
      • вул. Дніпровська 29
      • вул. Барвінкова 4, 14, 22
      • вул. Слов'янська 24, 14, 2
      • вул. Каштанова 6
      • вул. Калинова 6
      • вул. Олійника 6
      • вул. Степова 13/1
      • вул. Шевченко 9, 19, 29

      **29 квітня  (на 1,5 години пізніше звичного часу):**
      • вул. Степова 61/2, 67, 77
      • вул. Зелена 10, 16, 24, 30
      • вул. Гоголя 10, 16, 24, 30
      • вул. Тарасова 10, 16, 24, 30

      **30 квітня  (на 1,5 години пізніше звичного часу):**
      • вул. Українська 5, 25
      • вул. Привокзальна 5, 6, 16, 19, 26, 37, 49, 61, 75
      • вул. Хмельницького 10, 16, 24
      • вул. Степова 45, 51
      • вул. Криничанська 10, 20, 30
      **Управляюча компанія звертається до містян із проханням не залишати сміття у дворах та в невстановлених місцях.**
