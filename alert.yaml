    text: |
      **У зв’язку з проведенням планових робіт на електромережах у Вільногірську тимчасово припинятиметься електропостачання за низкою адрес.**
      **04 червня з 07:30 до 18:00:**
      •вул. Юрія Устенка: 72 (нова лікарня);
      **с. ПОСУНЬКИ:**
      • вул. Степова: 4А.

      **З 08:00 до 17:30 за адресами:**
      • вул. Центральна: 67Б, 75, 75В, 77.

  - show: true
    title: "📢 КП «Жілкомсервіс» інформує:"
    text: |
      **КП «Жілкомсервіс» повідомляє про зміни у графіку збору та вивозу сміття**
      **З 01 червня по 19 червня (на годину пізніше звичного часу):**
      • вул. Варена 7, 12
      • вул. Устенка 41, 43 
      • вул. Устенка 35А, 37
      • вул. Устенка 31, 30 
      • вул. Устенка 25, 23 
      • вул. Садова 30/21 
      • вул.Садова 7,5,3,8
      • вул. Степова 33, 31 
      • вул. Будівельників 8 
      • вул. Будівельників 11, 13 
      • вул. Центральна 12, 10, 4, 5 
      • вул. Центральна 3, 5, 7 
      • вул. Горняків 7, 8, 2, 1, 14, 16 
      • вул. Варена 13/7 
      • вул. Варена 21А, 21/8 
      • вул. Молодіжна 16/1, 16А
      **Можливе незначне відхилення часу прибуття спецтранспорту в межах кількох хвилин**

      **Управляюча компанія звертається до містян із проханням не залишати сміття у дворах та в невстановлених місцях.**


